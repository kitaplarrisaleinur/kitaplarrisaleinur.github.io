<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #f4f1ea; padding: 50px; }
        
        .risale-konteynir {
            width: 950px; /* Senin sihirli rakamın */
            margin: auto;
            background: white;
            padding: 40px;
            font-family: 'Amiri', serif;
            font-size: 32px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .satir {
            display: block;
            white-space: nowrap;
            line-height: 2.2;
            margin-bottom: 5px;
            transform-origin: right;
            /* Burası mizanpajı ip gibi dizecek */
        }
    </style>
</head>
<body>

<div class="risale-konteynir" id="kutu">
    <!-- ÖRNEK: "Bismillah" ifadesinin Unicode kodlarıyla dizimi -->
    <div class="satir">
        &#1576;&#1616;&#1587;&#1618;&#1605;&#1616; &#1575;&#1604;&#1604;&#1617;&#1648;&#1607;&#1616; 
        &#1607;&#1585; &#1582;&#1610;&#1585;&#1709; &#1576;&#1575;&#1588;&#1610;&#1583;&#1585;.
    </div>
    
    <!-- 1. Söz'ün devamı kodlarla -->
    <div class="satir">
        &#1606;&#1588;&#1575;&#1606;&#1610; &#1575;&#1608;&#1604;&#1583;&#1610;&#1594;&#1610; 
        &#1603;&#1576;&#1610;&#1548; &#1576;&#1578;&#1608;&#1606; &#1605;&#1608;&#1580;&#1608;&#1583;&#1575;&#1578;&#1709; 
        &#1604;&#1587;&#1575;&#1606; &#1581;&#1575;&#1604;&#1610;&#1604;&#1607;...
    </div>
</div>

<script>
    // Sayfa yüklendiğinde kodları ölçüp 950px'e tam eşitleyen mizanpaj motoru
    window.onload = function() {
        const hedef = 950;
        const satirlar = document.querySelectorAll('.satir');

        satirlar.forEach(s => {
            const dogalGenislik = s.scrollWidth;
            if (dogalGenislik > 0) {
                const oran = hedef / dogalGenislik;
                // Kısayı uzatır, uzunu daraltır (950px'e mıknatıs gibi yapıştırır)
                s.style.transform = `scaleX(${oran})`;
                s.style.width = hedef + "px";
            }
        });
    }
</script>

</body>
</html>
