<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Külliyat Sistem Menüsü</title>
</head>
<body>

    <!-- 1. GENİŞLİĞİ 180PX OLARAK KİLİTLENEN ANA GÖRSEL KUTU -->
    <div id="ayar-menusu" style="position:fixed; bottom:85px; right:25px; display:none; flex-direction:column; gap:10px; z-index:999999; background:white; padding:15px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.2); width:180px; max-width:180px; box-sizing:border-box; font-family:sans-serif; border:1px solid #ddd;">
        
        <button id="kapatMenuBtn" style="background:#d93025; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:16px; width:100%;">✕ KAPAT</button>
        
        <div style="display:flex; gap:5px; width:100%;">
            <button id="tumunuAcBtn" style="flex:1; background:#27ae60; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-size:12px;">Tümünü Aç</button>
            <button id="daraltBtn" style="flex:1; background:#34495e; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-size:12px;">Daralt</button>
        </div>

        <div style="display:flex; gap:5px; width:100%;">
            <button id="sayfaGitButonumuz" style="flex:1; background:#2980b9; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-size:12px;">Sayfaya Git</button>
            <input type="number" id="sayfaNoInput" placeholder="No" style="flex:1; background:#f5f5f5; border:1px solid #ddd; padding:10px; border-radius:8px; font-size:12px; text-align:center; outline:none; font-family:sans-serif; font-weight:bold; box-sizing:border-box; width:10px; min-width:0; color:#000;">
        </div>

        <div style="display:flex; gap:5px; width:100%;">
            <button id="fontArtiBtn" style="flex:1; background:#f5f5f5; border:1px solid #ddd; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; color:#000;">A+</button>
            <button id="fontEksiBtn" style="flex:1; background:#f5f5f5; border:1px solid #ddd; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; color:#000;">A-</button>
        </div>

        <button id="geceBtn" style="background:#34495e; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; width:100%;">🌙 Gece Modu</button>
        <button id="sifirlaBtn" style="background:#7f8c8d; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; font-size:11px; width:100%;">↺ Ayarları Sıfırla</button>
    
    </div>

    <!-- 2. DİŞLİ ÇARK BUTONU -->
    <button id="anaDisliBtn" style="position:fixed; bottom:25px; right:25px; width:55px; height:55px; border-radius:50%; border:none; background:#546e7a; color:white; font-size:26px; cursor:pointer; z-index:1000000; box-shadow:0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;">⚙️</button>

    <!-- 3. ÇARKIN AÇILMASINI VE BUTONLARIN BAĞIMSIZ DOSYALARI TETİKLEMESİNİ SAĞLAYAN KOD -->
    <script>
        // Sayfa ilk yüklenirken diğer bağımsız dosyalardaki hafıza yükleme fonksiyonlarını çağır
        if (typeof temaYukle === "function") temaYukle();
        if (typeof fontYukle === "function") fontYukle();

        // Dişli çark tıklama mekanizması (Kutuyu açar/kapatır ve çarkı döndürür)
        const menu = document.getElementById('ayar-menusu');
        const disli = document.getElementById('anaDisliBtn');

        disli.onclick = function() {
            const acikMi = menu.style.display === "flex";
            menu.style.display = acikMi ? "none" : "flex";
            disli.style.transform = acikMi ? "rotate(0deg)" : "rotate(90deg)";
        };

        // Butonları tamamen bağımsız diğer dosyalardaki fonksiyonlara bağlıyoruz
        document.getElementById('kapatMenuBtn').onclick = function() { menu.style.display = "none"; disli.style.transform = "rotate(0deg)"; };
        document.getElementById('tumunuAcBtn').onclick = function() { if (typeof detailsYonet === "function") detailsYonet(true); };
        document.getElementById('daraltBtn').onclick = function() { if (typeof detailsYonet === "function") detailsYonet(false); };
        document.getElementById('fontArtiBtn').onclick = function() { if (typeof fontBoyutlandir === "function") fontBoyutlandir(1.1); };
        document.getElementById('fontEksiBtn').onclick = function() { if (typeof fontBoyutlandir === "function") fontBoyutlandir(0.9); };
        document.getElementById('geceBtn').onclick = function() { if (typeof geceTetikle === "function") geceTetikle(); };
        
        document.getElementById('sayfaGitButonumuz').onclick = function() {
            const inputDegeri = document.getElementById('sayfaNoInput').value;
            if (typeof sayfayaYonlendir === "function") sayfayaYonlendir(inputDegeri);
        };

        document.getElementById('sifirlaBtn').onclick = function() {
            localStorage.clear();
            location.reload();
        };
    </script>

</body>
</html>
