<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Külliyat Arama</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; }
        
        /* Arama Alanı: Kibar ve derli toplu */
        .arama-konteyner { 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        
        /* Toplam Bulunan: Kırmızı, belirgin ve kutudan aşağı doğru mesafeli */
        .toplam-alan { 
            font-size: 18px; 
            font-weight: bold; 
            color: #d93025; 
            margin-bottom: 30px; /* Kutudan uzaklaştırdık */
            padding-bottom: 10px;
            border-bottom: 2px solid #f8f9fa;
        }
        
        /* Giriş Grubu: Boyutlar ideal seviyede */
        .input-grubu { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            align-items: center;
        }
        
        .arama-kutu { 
            padding: 10px 15px; 
            width: 70%; 
            font-size: 15px; 
            border: 1px solid #dfe1e5; 
            border-radius: 20px; 
            outline: none; 
            transition: 0.2s; 
        }
        .arama-kutu:focus { border-color: #1a73e8; box-shadow: 0 1px 6px rgba(32,33,36,0.1); }
        
        .ara-btn { 
            padding: 10px 20px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 20px; 
        }

        /* Liste: Kitaplar arası mesafe daraltıldı */
        #sonuclar { width: 100%; max-width: 500px; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        .kitap-satir { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 15px; 
            border-bottom: 1px solid #f8f9fa; 
            align-items: center; 
        }
        .kitap-satir:hover { background-color: #fcfcfc; }
        
        .kitap-link { text-decoration: none; color: #1a0dab; font-size: 15px; font-weight: 500; flex-grow: 1; }
        .rakam { background: #f1f3f4; color: #3c4043; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="arama-konteyner">
        <div id="toplamGosterge" class="toplam-alan">TOPLAM BULUNAN: 0</div>
        
        <div class="input-grubu">
            <input type="text" id="kelimeInput" class="arama-kutu" placeholder="Aranacak kelime..." autocomplete="off">
            <button onclick="kulliyatAra()" class="ara-btn">ARA</button>
        </div>
    </div>

    <div id="sonuclar">
        <!-- Sonuçlar buraya dökülecek -->
    </div>

<script>
    const kitaplar = [
        {no: "1.", ad: "Sözler", dosya: "sozler.html"},
        {no: "2.", ad: "Mektubat 1", dosya: "mektubat1.html"},
        {no: "3.", ad: "Mektubat 2", dosya: "mektubat2.html"},
        {no: "4.", ad: "Lem'alar", dosya: "lemalar.html"},
        {no: "5.", ad: "Şualar 1", dosya: "sualar1.html"},
        {no: "6.", ad: "Şualar 2", dosya: "sualar2.html"},
        {no: "7.", ad: "Sıracın Nur", dosya: "siracunnur.html"},
        {no: "8.", ad: "Zülfikar", dosya: "zulfikar.html"},
        {no: "9.", ad: "Asayı Musa", dosya: "asayimusa.html"},
        {no: "10.", ad: "Tılsımlar", dosya: "tilsimlar.html"},
        {no: "11.", ad: "İşaratül İcaz", dosya: "isaratulicaz.html"},
        {no: "12.", ad: "Mesnevi Nuriye", dosya: "mesnevinuriye.html"},
        {no: "13.", ad: "ST Gaybi", dosya: "stgaybi.html"},
        {no: "14.", ad: "Barla", dosya: "barla.html"},
        {no: "15.", ad: "Kastamonu", dosya: "kastamonu.html"},
        {no: "16.", ad: "Emirdağ 1", dosya: "emirdag1.html"},
        {no: "17.", ad: "Emirdağ 2", dosya: "emirdag2.html"},
        {no: "18.", ad: "Emirdağ 3", dosya: "emirdag3.html"},
        {no: "19.", ad: "Emirdağ 4", dosya: "emirdag4.html"},
        {no: "20.", ad: "Hanımlar Rehberi", dosya: "hanimlar.html"},
        {no: "21.", ad: "Gençlik Rehberi", dosya: "genclik.html"},
        {no: "22.", ad: "Muhakemat", dosya: "muhakemat.html"},
        {no: "23.", ad: "Nurun İlk Kapısı", dosya: "nurunilkkapisi.html"}
    ];

    function turkceKucuk(str) { 
        return str.replace(/İ/g, "i").replace(/I/g, "ı").toLowerCase(); 
    }

    async function kulliyatAra() {
        const aranan = document.getElementById('kelimeInput').value;
        if(!aranan) { alert("Lütfen bir kelime girin!"); return; }

        let genelToplam = 0;
        let html = "";
        const sonucDiv = document.getElementById('sonuclar');
        sonucDiv.innerHTML = "<p style='text-align:center; padding:15px; color:#888;'>Taranıyor...</p>";

        for (let kitap of kitaplar) {
            try {
                const res = await fetch(kitap.dosya);
                const metin = await res.text();
                const regex = new RegExp(turkceKucuk(aranan), 'g');
                const adet = (turkceKucuk(metin).match(regex) || []).length;
                genelToplam += adet;

                html += `
                <div class="kitap-satir">
                    <a class="kitap-link" href="${kitap.dosya}?ara=${encodeURIComponent(aranan)}">
                        ${kitap.no} ${kitap.ad}
                    </a>
                    <span class="rakam">${adet}</span>
                </div>`;
            } catch (e) { console.error(kitap.ad + " hatası."); }
        }

        document.getElementById('toplamGosterge').innerText = "TOPLAM BULUNAN: " + genelToplam;
        sonuclar.innerHTML = html;
    }
</script>
</body>
</html>
