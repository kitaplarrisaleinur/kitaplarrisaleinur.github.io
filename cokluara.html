<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nokta Atışı Radar (100 Harf)</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .ust-panel { background: #2c3e50; padding: 25px; border-radius: 20px; max-width: 600px; margin: auto; border: 2px solid #e67e22; }
        input { width: 85%; padding: 12px; border-radius: 25px; border: none; font-size: 16px; outline: none; margin-bottom: 15px; }
        button { background: #e67e22; color: white; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .sonuc-karti { background: white; color: #333; margin: 20px auto; padding: 25px; border-radius: 15px; text-align: left; border-left: 10px solid #e67e22; max-width: 700px; line-height: 1.8; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        mark { background: yellow; color: black; font-weight: bold; padding: 2px 5px; }
        #bilgi { margin-top: 15px; color: #f1c40f; font-weight: bold; }
        .git-btn { color:#3498db; font-weight:bold; text-decoration:none; cursor:pointer; display:inline-block; margin-top:10px; }
    </style>
</head>
<body>

<div class="ust-panel">
    <input type="text" id="aramaInput" placeholder="Kelimeleri yazın (Örn: hakiki iman)">
    <br>
    <button onclick="darRadar()">100 HARF MESAFELİ TARA</button>
    <div id="bilgi">Mesafe: 100 Harf (Sıkı Takip)</div>
</div>

<div id="sonucDökümü"></div>

<script>
async function darRadar() {
    const girdi = document.getElementById('aramaInput').value.toLocaleLowerCase('tr-TR').trim();
    const parcalar = girdi.split(/\s+/).filter(k => k.length >= 2);
    const döküm = document.getElementById('sonucDökümü');
    const bilgi = document.getElementById('bilgi');
    
    döküm.innerHTML = "";
    if (parcalar.length < 2) { bilgi.innerText = "En az 2 kelime yazın!"; return; }

    const MAX_MESAFE = 100; 
    const kitaplar = ["sozler.html", "mektubat1.html", "mektubat2.html", "lemalar.html", "sualar1.html", "sualar2.html", "siracunnur.html", "zulfikar.html", "asayimusa.html", "tilsimlar.html", "isaratulicaz.html", "mesnevinuriye.html", "stgaybi.html", "barla.html", "kastamonu.html", "emirdag1.html", "emirdag2.html", "emirdag3.html", "emirdag4.html", "hanimlar.html", "genclik.html", "muhakemat.html", "nurunilkkapisi.html"];

    bilgi.innerText = "100 harf hassasiyetiyle taranıyor...";

    for (let kitap of kitaplar) {
        try {
            const res = await fetch(kitap);
            if (!res.ok) continue;
            const html = await res.text();
            
            const div = document.createElement("div");
            div.innerHTML = html;
            const safMetin = div.innerText;
            const kucukMetin = safMetin.toLocaleLowerCase('tr-TR');

            for (let i = 0; i < kucukMetin.length; i++) {
                let buldukMu = false;
                let bulunanIdx = -1;

                for (let p of parcalar) {
                    if (kucukMetin.startsWith(p, i)) {
                        bulunanIdx = i;
                        buldukMu = true;
                        break;
                    }
                }

                if (buldukMu) {
                    let kesit = kucukMetin.slice(bulunanIdx, bulunanIdx + MAX_MESAFE);
                    let hepsiBurada = parcalar.every(p => kesit.includes(p));

                    if (hepsiBurada) {
                        // BURASI ÖNEMLİ: Mıknatıs parçayı koparıyoruz
                        let miknatis = safMetin.slice(bulunanIdx, bulunanIdx + 60).trim();
                        let orjinal = safMetin.slice(Math.max(0, bulunanIdx - 30), bulunanIdx + 200);
                        
                        parcalar.forEach(p => {
                            const reg = new RegExp(p, "gi");
                            orjinal = orjinal.replace(reg, m => `<mark>${m}</mark>`);
                        });

                        döküm.innerHTML += `
                            <div class="sonuc-karti">
                                <h3>📘 ${kitap.toUpperCase()}</h3>
                                <p>...${orjinal}...</p>
                                <a onclick="window.open('git.html?kitap=${kitap}&m=${encodeURIComponent(miknatis)}&k=${encodeURIComponent(parcalar.join(','))}', '_blank')" class="git-btn">Kitabı Tam O Noktada Aç ➜</a>
                            </div>`;
                        
                        i = bulunanIdx + MAX_MESAFE; 
                    }
                }
            }
        } catch (e) {}
    }
    bilgi.innerText = döküm.innerHTML === "" ? "100 harf içinde bulunamadı." : "Tarama bitti.";
}
</script>
</body>
</html>
