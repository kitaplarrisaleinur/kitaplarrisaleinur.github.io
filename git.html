<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kitap Açılıyor...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
        iframe { width: 100%; height: 100vh; border: none; background: white; }
    </style>
</head>
<body>
    <iframe id="pencere"></iframe>
    <script>
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const kitap = params.get('kitap');
        const miknatis = params.get('m');
        const kelimeler = params.get('k').split(',');

        if (kitap && miknatis) {
            const iframe = document.getElementById('pencere');
            iframe.src = kitap;
            iframe.onload = function() {
                const doc = iframe.contentDocument || iframe.contentWindow.document;

                // --- İNSAN GİBİ ÇÖZÜM: AKORDİYONLARI KÖKTEN SİLİYORUZ ---
                const stil = doc.createElement('style');
                stil.innerHTML = `
                    /* Kitaptaki tüm gizli bölmeleri ve akordiyonları zorla aç */
                    div, section, article, p, span, details { 
                        display: block !important; 
                        height: auto !important; 
                        max-height: none !important; 
                        visibility: visible !important; 
                        opacity: 1 !important; 
                        overflow: visible !important;
                        transform: none !important;
                    }
                    /* Akordiyon oklarını ve butonlarını gizle ki kafa karıştırmasın */
                    .accordion-toggle, .btn, button { display: none !important; }
                    /* Aranan kelimeleri parlat */
                    mark { background: yellow !important; color: black !important; font-weight: bold; }
                `;
                doc.head.appendChild(stil);

                // Metni bul ve işaretle
                const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, null, false);
                let node;
                while (node = walker.nextNode()) {
                    if (node.nodeValue.includes(miknatis)) {
                        let text = node.nodeValue;
                        let yeniHtml = text;
                        kelimeler.forEach(k => {
                            const reg = new RegExp(`(${k})`, "gi");
                            yeniHtml = yeniHtml.replace(reg, "<mark>$1</mark>");
                        });

                        const span = doc.createElement('span');
                        span.id = "HEDEF_TAM_BURASI";
                        span.innerHTML = yeniHtml;
                        node.parentNode.replaceChild(span, node);
                        
                        // Kitap artık tamamen "AÇIK" olduğu için kaydırma asla şaşmaz
                        setTimeout(() => {
                            span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 500);
                        break;
                    }
                }
            };
        }
    };
    </script>
</body>
</html>
