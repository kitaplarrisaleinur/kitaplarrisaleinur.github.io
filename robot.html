<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Külliyat Fihrist Robotu</title>
</head>
<body>
    <h2>23 Kitaplık Fihrist Hazırlayıcı</h2>
    <button onclick="fihristYap()" style="padding:15px; cursor:pointer; font-weight:bold;">TARAMAYI BAŞLAT</button>
    
    <div id="durum" style="margin-top:20px; font-family:sans-serif; color: blue;"></div>
    <a id="indir" style="display:none; margin-top:20px; font-weight:bold; color:red; font-size:20px;">Tıkla ve fihrist.js Dosyasını İndir</a>

    <script>
    // Senin verdiğin tam liste
    const kitaplar = [
        "sozler.html", "mektubat1.html", "mektubat2.html", "lemalar.html",
        "sualar1.html", "sualar2.html", "siracunnur.html", "zulfikar.html",
        "asayimusa.html", "tilsimlar.html", "isaratulicaz.html", "mesnevinuriye.html",
        "stgaybi.html", "barla.html", "kastamonu.html", "emirdag1.html",
        "emirdag2.html", "emirdag3.html", "emirdag4.html", "hanimlar.html",
        "genclik.html", "muhakemat.html", "nurunilkkapisi.html"
    ];

    async function fihristYap() {
        let anaFihrist = {};
        const durum = document.getElementById('durum');
        
        for (let kitap of kitaplar) {
            durum.innerText = kitap + " taranıyor...";
            try {
                const response = await fetch(kitap);
                if (!response.ok) throw new Error("Dosya eksik!");
                const html = await response.text();
                
                // HTML etiketlerini temizle, sadece düz metni al
                const geciciDiv = document.createElement("div");
                geciciDiv.innerHTML = html;
                const metin = geciciDiv.innerText.toLowerCase();
                
                // Kelimeleri bul (Türkçe karakterler dahil)
                const bulunanKelimeler = metin.match(/[a-zğüşıöç0-9]+/gi);

                if (bulunanKelimeler) {
                    bulunanKelimeler.forEach(kelime => {
                        if (kelime.length < 2) return; 
                        if (!anaFihrist[kelime]) anaFihrist[kelime] = {};
                        if (!anaFihrist[kelime][kitap]) anaFihrist[kelime][kitap] = 0;
                        anaFihrist[kelime][kitap]++;
                    });
                }
            } catch (hata) {
                console.log(kitap + " okunurken hata oluştu: ", hata);
            }
        }

        // Fihristi Dosyaya Çevir
        const veri = "const fihrist = " + JSON.stringify(anaFihrist) + ";";
        const blob = new Blob([veri], {type: 'text/javascript'});
        const link = document.getElementById('indir');
        link.href = URL.createObjectURL(blob);
        link.download = 'fihrist.js';
        link.style.display = 'block';
        durum.innerText = "İŞLEM TAMAM! 23 kitap fihristlendi.";
    }
    </script>
</body>
</html>
